spring.application.name=HospitalManagementSystem

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# JWT
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=${JWT_EXPIRATION_KEY}
jwt.issuer=${JWT_ISSUER_KEY}


# Refresh token cookie settings
jwt.refresh-token.cookie-name=${JWT_REFRESH_COOKIE_NAME:refreshToken}
jwt.refresh-token.cookie-secure=${JWT_COOKIE_SECURE:true}
jwt.refresh-token.cookie-same-site=${JWT_COOKIE_SAME_SITE:Lax}
jwt.refresh-token.cookie-http-only=${JWT_COOKIE_HTTP_ONLY:true}
jwt.refresh-token.cookie-domain=${JWT_COOKIE_DOMAIN:localhost}
